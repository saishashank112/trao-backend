services:
  - type: web
    name: trao-backend
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    rootDir: backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_COOKIE_EXPIRES_IN
        value: 7
      - key: RATE_LIMIT_MAX
        value: 100
      - key: AI_RATE_LIMIT_MAX
        value: 20
    healthCheckPath: /health
